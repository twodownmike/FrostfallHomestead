name: Deploy Godot Web to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.2
  GODOT_RELEASE: 4.6.2-stable
  GODOT_TEMPLATES_DIR: 4.6.2.stable

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip godot.zip -d godot
          sudo mv "godot/Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot web export templates
        run: |
          curl -L -o export_templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"
          unzip export_templates.tpz -d export_templates
          mv export_templates/templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}/"

      - name: Import project assets
        run: godot --headless --path . --import --quit

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
